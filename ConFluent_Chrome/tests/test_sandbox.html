<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ConFluent Stress Test Sandbox</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #fdfdfd;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            background: white;
        }

        h3 {
            margin-top: 0;
        }

        input,
        textarea,
        [contenteditable="true"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 4px;
            min-height: 40px;
        }

        [contenteditable="true"] {
            outline: none;
        }

        #chatbox {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            background: #e0f7fa;
            align-self: flex-start;
            max-width: 80%;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🧪 ConFluent UI Automator Sandbox</h2>

        <div class="box">
            <h3>1. Standard Textarea</h3>
            <textarea id="standard-textarea" placeholder="Type here..."></textarea>
        </div>

        <div class="box">
            <h3>2. contenteditable (e.g. standard rich text)</h3>
            <div id="rich-editor" contenteditable="true" aria-placeholder="Type rich text here..."></div>
        </div>

        <div class="box">
            <h3>3. Slate JS simulation (e.g. Discord shape)</h3>
            <div id="slate-editor" data-slate-editor="true" contenteditable="true" role="textbox">
                <p><span data-slate-string="true">Starting text</span></p>
            </div>
        </div>

        <div class="box" id="chatbox-container">
            <h3>4. Infinite Chat Feed (Conversation Mode Test)</h3>
            <button id="start-chat" style="margin-bottom: 10px;">Start Injecting Messages (10/sec)</button>
            <div id="chatbox">
                <div class="message">Vamos a ver cómo funciona esta extensión.</div>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('start-chat').addEventListener('click', () => {
            const chatbox = document.getElementById('chatbox');
            const phrases = [
                "Hola, ¿cómo estás?",
                "C'est un test de performance incroyable.",
                "Was machst du gerade?",
                "I absolutely love this new translation engine.",
                "La vie est belle quand le code compile.",
                "Me gusta mucho programar en JavaScript.",
                "Non so cosa dire, sto solo testando il sistema.",
            ];

            setInterval(() => {
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                chatbox.appendChild(msg);
                chatbox.scrollTop = chatbox.scrollHeight;
            }, 100); // 10 messages par seconde
        });
    </script>
</body>

</html>
