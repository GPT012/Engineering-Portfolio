<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">

    <!-- HEADER: Logo & Power Toggle -->
    <div class="header">
      <div class="brand">
        <div class="logo-container" id="logo-container">
          <svg class="fluent-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M14.5 7.5C15.8807 7.5 17 8.61929 17 10C17 11.3807 15.8807 12.5 14.5 12.5C13.1193 12.5 12 11.3807 12 10C12 8.61929 13.1193 7.5 14.5 7.5ZM9.5 7.5C10.8807 7.5 12 8.61929 12 10C12 11.3807 10.8807 12.5 9.5 12.5C8.11929 12.5 7 11.3807 7 10C7 8.61929 8.11929 7.5 9.5 7.5ZM14.5 5.5C12.756 5.5 11.129 6.275 10 7.545C8.871 6.275 7.244 5.5 5.5 5.5C2.462 5.5 0 7.962 0 11C0 14.038 2.462 16.5 5.5 16.5C7.244 16.5 8.871 15.725 10 14.455C11.129 15.725 12.756 16.5 14.5 16.5C17.538 16.5 20 14.038 20 11C20 7.962 17.538 5.5 14.5 5.5Z" />
          </svg>
          <div id="connection-dot" class="status-dot"></div>
        </div>
        <span class="brand-name">ConFluent</span>
      </div>

      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
          <!-- Moon Icon (Default) -->
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <label class="switch">
          <input type="checkbox" id="enabled">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- PROFILE BAR (populated after web login) -->
    <div class="profile-bar" id="profile-bar" style="display: none;">
      <div class="user-info">
        <img id="user-avatar" src="" alt="" class="user-avatar">
        <span id="user-name" class="user-name"></span>
      </div>
      <button id="logout-btn" class="icon-btn-small" title="Sign Out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
        </svg>
      </button>
    </div>

    <!-- SETTINGS CARD -->
    <div class="card" id="main-card">

      <!-- Reading Language -->
      <div class="section">
        <label>Reading Language</label>
        <div class="select-wrapper">
          <select id="myLang">
            <option value="en">English (US)</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="ru">Русский</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
            <option value="ar">العربية</option>
          </select>
          <svg class="select-icon" width="10" height="6" viewBox="0 0 10 6" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
      </div>

      <!-- Live Chat Translation Toggle -->
      <div class="section-header" style="margin-top: -6px; margin-bottom: 6px;">
        <div class="section-title">
          <span class="icon">📡</span>
          <span style="font-size: 13px;">Auto-Translate Incoming Chat</span>
        </div>
        <label class="switch small">
          <input type="checkbox" id="conversationMode">
          <span class="slider"></span>
        </label>
      </div>

      <!-- Divider -->
      <div style="height: 1px; background: var(--border); margin: 2px 0;"></div>

      <!-- Writing Language -->
      <div class="section">
        <label>Writing Language</label>
        <div class="select-wrapper">
          <select id="targetLang">
            <option value="en">English (US)</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="ru">Русский</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
            <option value="ar">العربية</option>
          </select>
          <svg class="select-icon" width="10" height="6" viewBox="0 0 10 6" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
      </div>

      <!-- Trigger Mode -->
      <div class="section">
        <label>Trigger</label>
        <div class="select-wrapper">
          <select id="triggerMode">
            <option value="timer">⏱️ Standard (1s Pause)</option>
            <option value="manual">✋ Manual (Ctrl+Enter)</option>
          </select>
          <svg class="select-icon" width="10" height="6" viewBox="0 0 10 6" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
      </div>



    </div>



  </div>

  <div id="status">Saved</div>

  <script src="popup.js"></script>
</body>

</html>
