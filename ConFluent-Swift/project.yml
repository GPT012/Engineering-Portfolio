name: ConFluent
options:
  bundleIdPrefix: com.confluent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"

targets:
  ConFluent:
    type: application
    platform: macOS
    sources:
      - ConFluent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.confluent.translator
        PRODUCT_NAME: ConFluent
        INFOPLIST_FILE: ConFluent/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ConFluent/Resources/ConFluent.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
