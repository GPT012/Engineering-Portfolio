<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            margin: 0;
        }
        h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #00bfff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .theme-option {
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .theme-option:hover {
            background: #333;
            border-color: #555;
        }
        .theme-option.selected {
            border-color: #00bfff;
            background: rgba(0, 191, 255, 0.1);
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <h2>Animation Studio</h2>
    <div id="origin" class="theme-option" data-theme="origin">
        <div class="color-dot" style="background: #00bfff;"></div>
        Origin Pulse (Cyan)
    </div>
    <div id="solar" class="theme-option" data-theme="solar">
        <div class="color-dot" style="background: #ff8c00;"></div>
        Solar Flare (Orange)
    </div>
    <div id="matrix" class="theme-option" data-theme="matrix">
        <div class="color-dot" style="background: #2ecc71;"></div>
        Neon Matrix (Green)
    </div>

    <script src="popup.js"></script>
</body>
</html>
